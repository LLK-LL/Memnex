  /* 鈺愨晲鈺愨晲鈺愨晲鈺?PRINCIPLES 鈺愨晲鈺愨晲鈺愨晲鈺?*/
  .principles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .principle {
    padding: 32px 32px 32px 0;
    border-top: 1px solid var(--border);
  }

  .principle:nth-child(even) {
    padding-left: 32px;

  }

  .principle:nth-child(1),

  }

  .principle-num {
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 12px;
    line-height: 1;
  }

  .principle h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .principle p {
    font-size: 14px;
    color: var(--mid);
    line-height: 1.6;
  }

  .principle--full {
    grid-column: 1 / -1;
    padding-left: 0;
    border-left: none;
  }

  /* 鈺愨晲鈺愨晲鈺愨晲鈺?RUBRIC 鈺愨晲鈺愨晲鈺愨晲鈺?*/
  .rubric-header {
    display: flex;
    gap: 48px;
    margin-bottom: 48px;
  }

  .rubric-stat {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .rubric-stat-num {
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
  }

  .rubric-stat-num--accent {
    color: var(--accent);
  }

  .rubric-stat-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--mid);
  }

  .rubric-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 40px;
  }

  .rubric-table caption {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--light);
    padding-bottom: 16px;
  }

  .rubric-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--light);
    padding: 12px 16px 12px 0;
    border-bottom: 2px solid var(--black);
  }

  .rubric-table td {
    padding: 14px 16px 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: top;
  }

  .rubric-table tr:last-child td {
    border-bottom: none;
  }

  .rubric-table .dim-num {
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    width: 36px;
  }

  .rubric-table .dim-name {
    font-weight: 600;
    white-space: nowrap;
  }

  .rubric-table .dim-weight {
    font-weight: 800;
    font-size: 20px;
    font-variant-numeric: tabular-nums;
    text-align: center;
    width: 60px;
    color: var(--dark);
  }

  .rubric-table .dim-desc {
    color: var(--mid);
    line-height: 1.5;
  }

  /* 鈺愨晲鈺愨晲鈺愨晲鈺?PHASES 鈺愨晲鈺愨晲鈺愨晲鈺?*/
  .phases {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .phase {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 40px;
    padding: 40px 0;
    border-top: 1px solid var(--border);
  }

  .phase:first-child {
    border-top: 1px solid var(--black);
  }

  .phase-id {
    font-size: 48px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -1px;
  }

  .phase-id span {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    margin-top: 8px;
  }

  .phase-body h3 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .phase-body p {
    font-size: 14px;
    color: var(--mid);
    line-height: 1.6;
    margin-bottom: 16px;
    max-width: 560px;
  }

  .phase-steps {
    list-style: none;
    counter-reset: step;
  }

  .phase-steps li {
    counter-increment: step;
    padding: 8px 0 8px 32px;
    position: relative;
    font-size: 14px;
    line-height: 1.5;
    color: var(--dark);
  }

  .phase-steps li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    top: 9px;
  }

  /* 鈺愨晲鈺愨晲鈺愨晲鈺?RATCHET 鈺愨晲鈺愨晲鈺愨晲鈺?*/
  .ratchet-viz {
    display: flex;
    align-items: flex-end;
    gap: 0;
    padding: 48px 0;
    position: relative;
  }

  .ratchet-viz::before {
    content: '';
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .ratchet-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .ratchet-bar {
    width: 80px;
    background: var(--black);
    position: relative;
    z-index: 1;
  }

  .ratchet-bar--revert {
    background: none;
    border: 2px solid var(--border);
  }

  .ratchet-score {
    font-size: 36px;
    font-weight: 900;
    margin-bottom: 8px;
    letter-spacing: -1px;
    line-height: 1;
  }

  .ratchet-score--revert {
    color: var(--light);
    text-decoration: line-through;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 2px;
  }

  .ratchet-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 12px;
    padding: 4px 10px;
  }

  .ratchet-label--keep {
    background: var(--black);
    color: var(--white);
  }

  .ratchet-label--revert {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  .ratchet-label--baseline {
    background: var(--accent);
    color: var(--white);
  }

  .ratchet-arrow {
    position: absolute;
    top: 50%;
    right: -12px;
    width: 24px;
    height: 2px;
    background: var(--border);
    z-index: 2;
  }

  .ratchet-arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -4px;
    border: solid var(--border);
    border-width: 0 2px 2px 0;
    padding: 3px;
    transform: rotate(-45deg);
  }

  .ratchet-round {
    font-size: 12px;
    color: var(--light);
    margin-top: 8px;
    font-weight: 500;
  }

  /* 鈺愨晲鈺愨晲鈺愨晲鈺?COMPARISON 鈺愨晲鈺愨晲鈺愨晲鈺?*/

    gap: 0;

  }

  .comparison-tag {

  }

  .comparison-col h3 {

    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .comparison-list {
    list-style: none;
  }

  .comparison-list li {
    padding: 10px 0;
    font-size: 14px;
    line-height: 1.5;
    border-bottom: 1px solid;
  }

  .comparison-col:first-child .comparison-list li {
    border-color: var(--border);
    color: var(--mid);
  }

  .comparison-col--highlight .comparison-list li {
    border-color: #333;
    color: #ccc;
  }

  .comparison-list li:last-child {
    border-bottom: none;
  }

  .comparison-list li strong {
    color: var(--black);
  }

    color: var(--white);
  }

  .check-icon {
    display: inline-block;
    width: 16px;
    height: 16px;
    margin-right: 8px;

    position: relative;
    top: -1px;

  .mapping-table td {

  .mapping-table td:nth-child(2) {

  .mapping-table td:last-child {
    color: var(--mid);
    line-height: 1.5;

  .mapping-arrow {
    display: inline-block;
    color: var(--accent);
    font-weight: 400;
    margin: 0 4px;

  /* 鈺愨晲鈺愨晲鈺愨晲鈺?FOOTER 鈺愨晲鈺愨晲鈺愨晲鈺?*/

  @media (max-width: 768px) {

    .phase { grid-template-columns: 1fr; gap: 16px; }

    .comparison-col:first-child { border-right: 1px solid var(--border); border-bottom: none; }

    .rubric-stat-num { font-size: 48px; }
    .mapping-table td:first-child { white-space: normal; }
  }
</style>
</head>
